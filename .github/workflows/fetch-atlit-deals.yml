name: Fetch Atlit Real Estate Deals

on:
  workflow_dispatch:
  schedule:
    # Daily at 07:00 UTC (10:00 Israel time)
    - cron: "0 7 * * *"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Atlit deals
        run: python atlit-real-estate/fetch_data.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add atlit-real-estate/data/deals.json
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: update Atlit real estate deals [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push origin main
